<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小钰の空間">
<meta name="theme-color" content="#FFF5F5">
<title>小钰の空間</title>
<link rel="manifest" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FFF5F5;--bg2:#FFF0F2;--card:#FFFFFF;--card-shadow:0 2px 16px rgba(232,160,180,0.10);
  --accent:#E8A0B4;--accent-light:#FADDE5;--accent-hover:#D4899E;
  --text:#4A3540;--muted:#9E8A92;--border:#F0DDE3;
  --success:#7CAE7A;--danger:#D4726A;--soft:#FEF0F2;
  --pink:#F4ACB7;--lavender:#D4B8E0;--mint:#B8E0D0;--sky:#B8D0E8;
  --nav-bg:rgba(255,245,245,0.88);--nav-border:rgba(240,221,227,0.8);
  --nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px);
  --float1:#F4ACB7;--float2:#D4B8E0;--float3:#FADDE5;--float4:#B8E0D0;
  --glow:rgba(232,160,180,0.15);
}
.dark {
  --bg:#1E1520;--bg2:#251A28;--card:#2D2232;--card-shadow:0 2px 16px rgba(0,0,0,0.25);
  --accent:#E8A0B4;--accent-light:#3D2535;--accent-hover:#F0B8C8;
  --text:#F0DDE3;--muted:#9E8A99;--border:#3D2535;
  --success:#7CAE7A;--danger:#D4726A;--soft:#2D2232;
  --pink:#C4788A;--lavender:#9988BB;--mint:#6BA894;--sky:#7BA0C0;
  --nav-bg:rgba(30,21,32,0.92);--nav-border:rgba(61,37,53,0.8);
  --float1:rgba(244,172,183,0.12);--float2:rgba(212,184,224,0.12);--float3:rgba(250,221,229,0.12);--float4:rgba(184,224,208,0.12);
  --glow:rgba(232,160,180,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand','Noto Sans SC',sans-serif;background:linear-gradient(160deg,var(--bg),var(--bg2));
  color:var(--text);overflow:hidden;height:100dvh;display:flex;flex-direction:column;transition:background .4s,color .4s}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}

/* ── Floating Decorations ── */
.floats{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.float{position:absolute;border-radius:50%;opacity:.35;animation:floaty linear infinite}
.float:nth-child(1){width:130px;height:130px;background:var(--float1);top:8%;left:-35px;animation-duration:18s}
.float:nth-child(2){width:90px;height:90px;background:var(--float2);top:38%;right:-25px;animation-duration:22s;animation-delay:-5s}
.float:nth-child(3){width:65px;height:65px;background:var(--float3);bottom:22%;left:18%;animation-duration:15s;animation-delay:-8s}
.float:nth-child(4){width:105px;height:105px;background:var(--float4);top:58%;right:28%;animation-duration:20s;animation-delay:-3s}
.float:nth-child(5){width:45px;height:45px;background:var(--float1);top:78%;left:58%;animation-duration:16s;animation-delay:-10s}
@keyframes floaty{
  0%{transform:translateY(0) rotate(0deg) scale(1)}
  25%{transform:translateY(-30px) rotate(90deg) scale(1.1)}
  50%{transform:translateY(10px) rotate(180deg) scale(0.95)}
  75%{transform:translateY(-20px) rotate(270deg) scale(1.05)}
  100%{transform:translateY(0) rotate(360deg) scale(1)}
}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;
  padding-top:calc(14px + env(safe-area-inset-top,0px));flex-shrink:0;position:relative;z-index:10}
.header h1{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;
  text-shadow:0 0 20px var(--glow)}
.header-btns{display:flex;gap:6px}
.header-btn{background:var(--card);border:1.5px solid var(--border);width:36px;height:36px;border-radius:50%;
  font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .3s;
  box-shadow:var(--card-shadow)}
.header-btn:active{transform:scale(0.9)}

/* ── Main ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 16px;-webkit-overflow-scrolling:touch;
  position:relative;z-index:1}

/* ── Page Transition ── */
.page-enter{animation:pageIn .35s ease both}
@keyframes pageIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Bottom Nav ── */
.nav{display:flex;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--nav-border);flex-shrink:0;padding-bottom:var(--safe-b);
  position:relative;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;
  background:none;border:none;font-size:10px;color:var(--muted);transition:all .25s;font-weight:600}
.nav-btn.active{color:var(--accent)}
.nav-btn .icon{font-size:20px;line-height:1;transition:transform .2s}
.nav-btn.active .icon{transform:scale(1.15)}
.nav-btn:active .icon{transform:scale(0.85)}

/* ── Cards ── */
.card{background:var(--card);border-radius:20px;padding:16px;border:1px solid var(--border);
  margin-bottom:12px;box-shadow:var(--card-shadow);transition:all .3s;position:relative;overflow:hidden}
.card:active{transform:scale(0.985)}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* ── Countdown Cards ── */
.cd-card{padding:16px;border-radius:20px;position:relative;overflow:hidden;border:1px solid var(--border);
  box-shadow:var(--card-shadow);transition:all .3s}
.cd-card:active{transform:scale(0.97)}
.cd-card .deco{position:absolute;pointer-events:none}
.cd-love{background:linear-gradient(135deg,#FFF0F3,#FFE4EC);border-color:#F8D7DE}
.dark .cd-love{background:linear-gradient(135deg,#2D1F2B,#35253A);border-color:#3D2535}
.cd-japan{background:linear-gradient(135deg,#FFF0F8,#F8E8F4);border-color:#F0D0E0}
.dark .cd-japan{background:linear-gradient(135deg,#1E2235,#222840);border-color:#2A3050}
.cd-tag{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
.cd-days{font-size:34px;font-weight:800;line-height:1.2}
.cd-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;
  border-radius:14px;border:none;font-size:14px;font-weight:700;transition:all .25s;letter-spacing:0.3px}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--accent-light);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:10px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── Inputs ── */
.input{width:100%;padding:10px 14px;border-radius:14px;border:1.5px solid var(--border);
  background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:all .25s;font-weight:500}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,160,180,0.15)}
textarea.input{resize:none;min-height:60px}

/* ── Mood ── */
.mood-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.mood-chip{font-size:26px;padding:6px 8px;border-radius:14px;border:2.5px solid transparent;
  background:none;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:1px}
.mood-chip span{font-size:10px;color:var(--muted);font-weight:600}
.mood-chip.active{border-color:var(--accent);background:var(--soft);transform:scale(1.1)}
.mood-chip:active{transform:scale(0.9)}

/* ── Todo ── */
.todo-item{display:flex;align-items:center;gap:10px;padding:12px 14px}
.todo-check{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--accent);background:none;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:all .25s}
.todo-check.done{background:var(--success);border-color:var(--success)}
.todo-check:active{transform:scale(0.85)}
.todo-text{flex:1;font-size:14px;font-weight:500}
.todo-text.done{text-decoration:line-through;color:var(--muted)}
.todo-del{background:none;border:none;color:var(--muted);font-size:16px;padding:4px;transition:all .2s}
.todo-del:active{transform:scale(0.8);color:var(--danger)}

/* ── Vocab ── */
.vocab-item{display:flex;align-items:center;gap:10px;padding:10px 14px}
.vocab-star{background:none;border:none;font-size:16px;padding:2px;transition:transform .2s}
.vocab-star:active{transform:scale(1.3)}
.vocab-ja{font-size:15px;font-weight:700}
.vocab-zh{font-size:14px;color:var(--muted);margin-left:8px;font-weight:500}
.flashcard{width:100%;max-width:320px;height:180px;margin:0 auto;border-radius:22px;
  border:2.5px solid var(--accent);background:var(--card);display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(232,160,180,0.15);
  transition:all .3s}
.flashcard:active{transform:scale(0.97) rotateY(5deg)}

/* ── Chat ── */
.chat-area{flex:1;overflow-y:auto;padding:10px;background:var(--bg);border-radius:16px;
  border:1px solid var(--border);margin-bottom:10px;-webkit-overflow-scrolling:touch;min-height:0}
.chat-msg{display:flex;margin-bottom:10px}
.chat-msg.user{justify-content:flex-end}
.chat-msg.assistant{justify-content:flex-start}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;
  white-space:pre-wrap;font-weight:500;transition:all .3s}
.chat-msg.user .chat-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-msg.assistant .chat-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-input-row{display:flex;gap:8px;flex-shrink:0;position:relative;z-index:5}

/* ── Chat Sessions ── */
.sess-bar{display:flex;gap:6px;overflow-x:auto;flex-shrink:0;padding-bottom:8px;margin-bottom:4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.sess-bar::-webkit-scrollbar{display:none}
.sess-tab{flex-shrink:0;padding:6px 14px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--card);font-size:12px;font-weight:700;color:var(--muted);transition:all .25s;
  display:flex;align-items:center;gap:4px;white-space:nowrap;max-width:120px}
.sess-tab.active{border-color:var(--accent);color:var(--accent);background:var(--soft)}
.sess-tab:active{transform:scale(0.93)}
.sess-tab .sess-name{overflow:hidden;text-overflow:ellipsis}
.sess-add{flex-shrink:0;width:32px;height:32px;border-radius:12px;border:1.5px dashed var(--border);
  background:none;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:all .25s}
.sess-add:active{transform:scale(0.9);border-color:var(--accent);color:var(--accent)}
.sess-actions{display:flex;gap:4px;flex-shrink:0}
.sess-act-btn{padding:4px 8px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  font-size:11px;font-weight:600;color:var(--muted);transition:all .2s}
.sess-act-btn:active{transform:scale(0.9)}

/* ── Settings ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;opacity:0;pointer-events:none;
  transition:opacity .3s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.overlay.show{opacity:1;pointer-events:auto}
.settings-panel{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:22px 22px 0 0;
  z-index:101;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,.37,1.02);
  max-height:85dvh;display:flex;flex-direction:column;padding-bottom:var(--safe-b)}
.settings-panel.show{transform:translateY(0)}
.settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.settings-header h2{font-size:17px;font-weight:800}
.settings-body{overflow-y:auto;padding:16px 20px;flex:1;-webkit-overflow-scrolling:touch}
.setting-group{margin-bottom:18px}
.setting-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px}
.setting-row{display:flex;gap:8px;margin-bottom:8px}

/* ── Memory items ── */
.mem-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px;font-weight:500}
.mem-item .dot{color:var(--accent)}
.mem-item .del{background:none;border:none;color:var(--muted);font-size:14px;padding:2px;cursor:pointer}

/* ── Calendar View ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-header{font-size:11px;font-weight:700;color:var(--muted);text-align:center;padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:10px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;
  position:relative;background:transparent}
.cal-day:active{transform:scale(0.9)}
.cal-day.today{background:var(--accent-light);font-weight:800}
.cal-day.has-diary::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;
  border-radius:50%;background:var(--accent)}
.cal-day.other-month{opacity:.3}

/* ── Import Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;
  align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:22px;padding:24px;width:100%;max-width:400px;max-height:80dvh;
  overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:18px;font-weight:800;margin-bottom:12px}

/* ── Celebration ── */
.celebration{position:fixed;inset:0;z-index:300;pointer-events:none;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
.milestone-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:301;
  background:var(--card);border-radius:24px;padding:28px 36px;text-align:center;
  box-shadow:0 12px 48px rgba(232,160,180,0.3);border:2px solid var(--accent);
  animation:toastIn .5s ease both;pointer-events:auto}
@keyframes toastIn{
  from{opacity:0;transform:translate(-50%,-50%) scale(0.8)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

/* ── Utility ── */
.sec-title{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:8px}
.page-title{font-size:22px;font-weight:800;margin-bottom:16px;letter-spacing:-0.5px}
.tab-row{display:flex;gap:6px}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:14px;font-weight:500}
.row{display:flex;gap:8px}
.mb-12{margin-bottom:12px}
.stat-val{font-size:26px;font-weight:800;color:var(--accent);line-height:1.2}
.stat-label{font-size:12px;color:var(--muted);font-weight:600}
.progress-bar{height:5px;border-radius:3px;background:var(--accent-light);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s ease}
.diary-entry{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
.diary-entry:last-child{border-bottom:none}
.diary-del{background:none;border:none;color:var(--danger);font-size:11px;cursor:pointer;padding:0;margin-top:4px;font-weight:600}
.chat-page{display:flex;flex-direction:column;height:100%}

/* ── Daily JP sentence ── */
.jp-sentence{padding:14px 16px;background:linear-gradient(135deg,var(--soft),var(--accent-light));
  border-radius:16px;margin-bottom:12px;border:1px solid var(--border)}
.jp-sentence .jp{font-size:16px;font-weight:700;margin-bottom:4px;line-height:1.5}
.jp-sentence .zh{font-size:13px;color:var(--muted);font-weight:500}

/* ── Sparkle animation ── */
@keyframes sparkle{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.sparkle{animation:sparkle 2s ease-in-out infinite}
.sparkle-d1{animation-delay:0s}
.sparkle-d2{animation-delay:.5s}
.sparkle-d3{animation-delay:1s}
.sparkle-d4{animation-delay:1.5s}

/* ── Sakura fall ── */
@keyframes sakuraFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:0}
  10%{opacity:.7}
  100%{transform:translateY(140px) rotate(360deg) translateX(20px);opacity:0}
}
.sakura{animation:sakuraFall 4s ease-in infinite}

/* ── Search bar ── */
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{padding-left:36px}
.search-bar::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1}

/* ── Keyboard open state (iOS) ── */
body.kb-open .nav{display:none}
body.kb-open .floats{display:none}
body.kb-open .header{padding-top:8px;padding-bottom:8px}
body.kb-open .header h1{font-size:16px}
body.kb-open .header-btn{width:30px;height:30px;font-size:15px}
</style>
</head>
<body>

<div class="floats">
  <div class="float"></div><div class="float"></div><div class="float"></div>
  <div class="float"></div><div class="float"></div>
</div>

<div class="header">
  <h1>✦ 小钰の空間</h1>
  <div class="header-btns">
    <button class="header-btn" onclick="toggleDark()" id="dark-btn">🌙</button>
    <button class="header-btn" onclick="toggleSettings()">⚙️</button>
  </div>
</div>

<div class="main" id="content"></div>

<nav class="nav" id="nav"></nav>

<div class="overlay" id="overlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h2>⚙️ 设置</h2>
    <button class="header-btn" onclick="toggleSettings()" style="border:none;background:none;box-shadow:none;font-size:20px">✕</button>
  </div>
  <div class="settings-body" id="settingsBody"></div>
</div>

<div id="modalRoot"></div>
<div id="celebrationRoot"></div>

<script>
// ━━━━━━━━━━ DATA ━━━━━━━━━━
const store = {
  get(k, fb) { try { const v = localStorage.getItem('zoe-'+k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  set(k, v) { try { localStorage.setItem('zoe-'+k, JSON.stringify(v)); } catch {} },
};

let diary = store.get('diary', []);
let todos = store.get('todos', []);
let words = store.get('vocab', []);
let memories = store.get('memories', []);
let chatSessions = store.get('chatSessions', [{id:1,name:'新对话 1',msgs:[],ts:Date.now()}]);
let curSessId = store.get('chatSessId', 1);
function curSess(){return chatSessions.find(s=>s.id===curSessId)||chatSessions[0]}
let isDark = store.get('dark', false);
let apiConfig = store.get('api', {
  provider:'none', url:'', key:'', model:'',
  sysPrompt:'你是小钰的私人AI助手。你温柔、有趣、记忆力很好。用中文回复，语气亲切自然，可以用颜文字但不要用😏或😂。回复简洁有用。',
});
let apiUsage = store.get('apiUsage', {total:{in:0,out:0,reqs:0},daily:{}});
let celebratedMilestones = store.get('celebrated', []);

function saveDiary(){store.set('diary',diary)} function saveTodos(){store.set('todos',todos)}
function saveWords(){store.set('vocab',words)} function saveMemories(){store.set('memories',memories)}
function saveChat(){store.set('chatSessions',chatSessions.map(s=>({...s,msgs:s.msgs.slice(-50)})));store.set('chatSessId',curSessId)} function saveApi(){store.set('api',apiConfig)}
function saveUsage(){store.set('apiUsage',apiUsage)}
function saveCelebrated(){store.set('celebrated',celebratedMilestones)}
function trackUsage(inTok,outTok){
  const today=fmtDate(new Date());
  apiUsage.total.in+=inTok;apiUsage.total.out+=outTok;apiUsage.total.reqs++;
  if(!apiUsage.daily[today])apiUsage.daily[today]={in:0,out:0,reqs:0};
  apiUsage.daily[today].in+=inTok;apiUsage.daily[today].out+=outTok;apiUsage.daily[today].reqs++;
  saveUsage();
}
function estimateCost(){
  const p=apiConfig.provider;const i=apiUsage.total.in,o=apiUsage.total.out;
  if(p==='anthropic')return((i*3+o*15)/1e6).toFixed(3);
  if(p==='deepseek')return((i*1+o*2)/1e6).toFixed(3);
  if(p==='openai')return((i*0.15+o*0.6)/1e6).toFixed(4);
  return((i*3+o*10)/1e6).toFixed(3);
}

function checkMilestone(days){
  if(!MILESTONES.includes(days))return;
  if(celebratedMilestones.includes(days))return;
  celebratedMilestones.push(days);
  saveCelebrated();
  showCelebration(days);
}

function showCelebration(days){
  const root=document.getElementById('celebrationRoot');
  const msg=MILESTONE_MSGS[days]||`${days}天纪念日快乐！💕`;
  
  // Confetti
  let confettiHtml='<div class="celebration">';
  const colors=['#F4ACB7','#D4B8E0','#E8A0B4','#B8E0D0','#FFD700','#FF6B8A','#87CEEB'];
  for(let i=0;i<60;i++){
    const c=colors[Math.floor(Math.random()*colors.length)];
    const l=Math.random()*100;
    const d=Math.random()*2+1;
    const dur=Math.random()*2+2;
    const sz=Math.random()*6+4;
    confettiHtml+=`<div class="confetti" style="left:${l}%;animation-delay:${d}s;animation-duration:${dur}s;width:${sz}px;height:${sz}px;background:${c};border-radius:${Math.random()>.5?'50%':'2px'}"></div>`;
  }
  confettiHtml+='</div>';
  
  root.innerHTML=confettiHtml+`
    <div class="milestone-toast" onclick="this.parentElement.innerHTML=''">
      <div style="font-size:48px;margin-bottom:8px">🎉</div>
      <div style="font-size:28px;font-weight:800;color:var(--accent);margin-bottom:6px">${days}天</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);line-height:1.5">${msg}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:12px">点击关闭</div>
    </div>`;
  
  setTimeout(()=>{root.innerHTML=''},8000);
}

    renderCalendar(box);
  } else {
    box.innerHTML=diary.length===0?'<div class="empty">📖 还没有日记，快去写第一篇吧～</div>':
      diary.map((d,i)=>`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="display:flex;align-items:center;gap:8px"><span style="font-size:22px">${d.mood}</span>
          <span style="font-size:14px;font-weight:700">${MOODS.find(m=>m.emoji===d.mood)?.label||''}</span></div>
          <span style="font-size:12px;color:var(--muted);font-weight:600">${d.date}</span>
        </div>
        ${d.text?`<p style="font-size:14px;line-height:1.6;margin:4px 0 0;font-weight:500">${d.text}</p>`:''}
        <button class="diary-del" onclick="deleteDiary(${i})">删除</button>
      </div>`).join('');
  }
}

function renderCalendar(box){
  const now=new Date();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrevMonth=new Date(calYear,calMonth,0).getDate();
  const monthNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  
  let daysHtml='';
  // Previous month days
  for(let i=firstDay-1;i>=0;i--){
    daysHtml+=`<div class="cal-day other-month">${daysInPrevMonth-i}</div>`;
  }
  // Current month days
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasDiary=diary.some(e=>e.date===dateStr);
    const isToday=dateStr===fmtDate(now);
    const entry=diary.find(e=>e.date===dateStr);
    daysHtml+=`<div class="cal-day${isToday?' today':''}${hasDiary?' has-diary':''}" 
      onclick="showDiaryForDate('${dateStr}')" title="${entry?entry.mood+' '+(entry.text||'').slice(0,20):''}">${d}</div>`;
  }
  // Next month days
  const totalCells=firstDay+daysInMonth;
  const remaining=totalCells%7===0?0:7-totalCells%7;
  for(let i=1;i<=remaining;i++){
    daysHtml+=`<div class="cal-day other-month">${i}</div>`;
  }
  
  box.innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button class="btn btn-sm btn-secondary" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderDiary(document.getElementById('content'))">◀</button>
      <div style="font-size:16px;font-weight:800">${calYear}年 ${monthNames[calMonth]}</div>
      <button class="btn btn-sm btn-secondary" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderDiary(document.getElementById('content'))">▶</button>
    </div>
    <div class="cal-grid">
      ${['日','月','火','水','木','金','土'].map(d=>`<div class="cal-header">${d}</div>`).join('')}
      ${daysHtml}
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center;font-weight:500">
      本月写了 ${diary.filter(d=>{const dd=new Date(d.date);return dd.getMonth()===calMonth&&dd.getFullYear()===calYear}).length} 篇日记
    </div>
  </div>
  <div id="calDiaryDetail"></div>`;
}

function showDiaryForDate(dateStr){
  const entry=diary.find(d=>d.date===dateStr);
  const box=document.getElementById('calDiaryDetail');
  if(!box)return;
  if(!entry){
    box.innerHTML=`<div class="card" style="text-align:center"><div style="font-size:13px;color:var(--muted);font-weight:500">${dateStr} 没有日记</div></div>`;
    return;
  }
  box.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:24px">${entry.mood}</span>
      <span style="font-size:14px;font-weight:700">${MOODS.find(m=>m.emoji===entry.mood)?.label||''}</span>
      <span style="font-size:12px;color:var(--muted);margin-left:auto;font-weight:600">${entry.date}</span>
    </div>
    ${entry.text?`<p style="font-size:14px;line-height:1.6;font-weight:500">${entry.text}</p>`:''}
  </div>`;
}

function submitDiary(){
  const t=document.getElementById('diary-text')?.value||'';
  const e={date:fmtDate(new Date()),mood:diaryMood,text:t,ts:Date.now()};
  const i=diary.findIndex(d=>d.date===e.date);
  if(i>=0)diary[i]=e;else diary.unshift(e);
  saveDiary();diaryMood=null;renderDiary(document.getElementById('content'));
}
function deleteDiary(i){diary.splice(i,1);saveDiary();renderDiary(document.getElementById('content'))}

function addTodo(){const e=document.getElementById('ti');if(!e?.value.trim())return;todos.unshift({id:Date.now(),text:e.value.trim(),done:false});saveTodos();renderTodo(document.getElementById('content'))}
function toggleTodo(id){const t=todos.find(x=>x.id===id);if(t)t.done=!t.done;saveTodos();renderTodo(document.getElementById('content'))}
function removeTodo(id){todos=todos.filter(x=>x.id!==id);saveTodos();renderTodo(document.getElementById('content'))}

        <button class="vocab-star" onclick="toggleStar(${ri})">${w.star?'⭐':'☆'}</button>

// ── Import Modal ──
function showImportModal(){
  document.getElementById('modalRoot').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeImportModal()">
      <div class="modal">
        <h3>📥 批量导入单词</h3>
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:500;line-height:1.5">
          每行一个单词，用逗号或Tab分隔日语和中文<br>
          例：<span style="color:var(--accent)">食べる,吃</span> 或 <span style="color:var(--accent)">飲む	喝</span>
        </div>
        <textarea class="input" id="importText" rows="8" placeholder="食べる,吃&#10;飲む,喝&#10;行く,去&#10;来る,来"></textarea>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-secondary" style="flex:1" onclick="closeImportModal()">取消</button>
          <button class="btn btn-primary" style="flex:1" onclick="doImport()">导入</button>
        </div>
      </div>
    </div>`;
}
function closeImportModal(){document.getElementById('modalRoot').innerHTML=''}
function doImport(){
  const text=document.getElementById('importText')?.value||'';
  const lines=text.split('\n').filter(l=>l.trim());
  let count=0;
  lines.forEach(line=>{
    let parts;
    if(line.includes('\t'))parts=line.split('\t');
    else if(line.includes(','))parts=line.split(',');
    else if(line.includes('，'))parts=line.split('，');
    else return;
    const ja=(parts[0]||'').trim(), zh=(parts[1]||'').trim();
    if(ja&&zh){words.unshift({ja,zh,star:false});count++}
  });
  saveWords();closeImportModal();
  if(count>0)alert(`成功导入 ${count} 个单词！`);
  renderVocab(document.getElementById('content'));
}

// Session management
function newSess(){
  const id=Date.now();
  chatSessions.push({id,name:`对话 ${chatSessions.length+1}`,msgs:[],ts:id});
  curSessId=id;saveChat();renderChat(document.getElementById('content'));
}
function switchSess(id){curSessId=id;saveChat();renderChat(document.getElementById('content'))}
function renameSess(){
  const s=curSess();const name=prompt('给这个对话取个名字：',s.name);
  if(name&&name.trim()){s.name=name.trim();saveChat();renderChat(document.getElementById('content'))}
}
function clearSess(){curSess().msgs=[];saveChat();renderChat(document.getElementById('content'))}
function deleteSess(){
  if(chatSessions.length<=1)return;
  if(!confirm('确定删除这个对话？'))return;
  chatSessions=chatSessions.filter(s=>s.id!==curSessId);
  curSessId=chatSessions[chatSessions.length-1].id;
  saveChat();renderChat(document.getElementById('content'));
}

// Compress current session
async function compressSess(){
  const sess=curSess();
  if(sess.msgs.length<4||chatLoading)return;
  chatLoading=true;renderChat(document.getElementById('content'));
  try{
    const sys='请用2-3句话简洁地总结以下对话的要点和关键信息，保留重要的事实和结论。只输出总结内容。';
    const convo=sess.msgs.map(m=>`${m.role==='user'?'用户':'AI'}: ${m.content}`).join('\n');
    let summary='';
    if(apiConfig.provider==='anthropic'){
      const r=await fetch(apiConfig.url,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiConfig.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:apiConfig.model,max_tokens:512,system:sys,messages:[{role:'user',content:convo}]})});
      const d=await r.json();summary=d.content?.map(c=>c.text||'').join('')||'压缩失败...';
      if(d.usage)trackUsage(d.usage.input_tokens||0,d.usage.output_tokens||0);
    }else{
      const r=await fetch(apiConfig.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiConfig.key}`},
        body:JSON.stringify({model:apiConfig.model,max_tokens:512,messages:[{role:'system',content:sys},{role:'user',content:convo}]})});
      const d=await r.json();summary=d.choices?.[0]?.message?.content||'压缩失败...';
      if(d.usage)trackUsage(d.usage.prompt_tokens||0,d.usage.completion_tokens||0);
    }
    sess.msgs=[{role:'assistant',content:summary,compressed:true}];
    saveChat();
  }catch(e){alert('压缩失败，检查API设置');}
  chatLoading=false;renderChat(document.getElementById('content'));
}

function addMem(){const e=document.getElementById('mi');if(!e?.value.trim())return;memories.push(e.value.trim());saveMemories();renderChat(document.getElementById('content'))}
function removeMem(i){memories.splice(i,1);saveMemories();renderChat(document.getElementById('content'))}

async function sendChat(){
  const e=document.getElementById('ci');if(!e?.value.trim()||chatLoading)return;
  const sess=curSess();
  const text=e.value.trim();sess.msgs.push({role:'user',content:text});saveChat();chatLoading=true;
  renderChat(document.getElementById('content'));
  try{
    const sys=apiConfig.sysPrompt+(memories.length?'\n\n以下是你记住的关于小钰的信息：\n'+memories.map((m,i)=>`${i+1}. ${m}`).join('\n'):'');
    let reply='';
    if(apiConfig.provider==='anthropic'){
      const r=await fetch(apiConfig.url,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiConfig.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:apiConfig.model,max_tokens:1024,system:sys,messages:sess.msgs.filter(m=>m.role!=='system').slice(-20).map(m=>({role:m.role,content:m.content}))})});
      const d=await r.json();reply=d.content?.map(c=>c.text||'').join('')||d.error?.message||'出错了...';
      if(d.usage)trackUsage(d.usage.input_tokens||0,d.usage.output_tokens||0);
    }else{
      const msgs=[{role:'system',content:sys},...sess.msgs.filter(m=>m.role!=='system').slice(-20).map(m=>({role:m.role,content:m.content}))];
      const r=await fetch(apiConfig.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiConfig.key}`},
        body:JSON.stringify({model:apiConfig.model,max_tokens:1024,messages:msgs})});
      const d=await r.json();reply=d.choices?.[0]?.message?.content||d.error?.message||'出错了...';
      if(d.usage)trackUsage(d.usage.prompt_tokens||0,d.usage.completion_tokens||0);
    }
    sess.msgs.push({role:'assistant',content:reply});
  }catch(e){sess.msgs.push({role:'assistant',content:'网络出了点问题 (´；ω；`)'});}
  saveChat();chatLoading=false;renderChat(document.getElementById('content'));
}

  openai:{l:'OpenAI',u:'https://api.openai.com/v1/chat/completions',m:'gpt-4o-mini'},
  custom:{l:'自定义',u:'',m:''},
};
function toggleSettings(){
  const p=document.getElementById('settingsPanel'),o=document.getElementById('overlay');
  if(p.classList.contains('show')){p.classList.remove('show');o.classList.remove('show')}
  else{renderSettings();p.classList.add('show');o.classList.add('show')}
}
function renderSettings(){
  document.getElementById('settingsBody').innerHTML=`
    <div class="setting-group"><div class="setting-label">AI 服务商</div>
      <select class="input" id="sp" onchange="onProvChange()">
        ${Object.entries(PROVS).map(([k,v])=>`<option value="${k}" ${apiConfig.provider===k?'selected':''}>${v.l}</option>`).join('')}
      </select></div>
    <div id="af" style="${apiConfig.provider==='none'?'display:none':''}">
      <div class="setting-group"><div class="setting-label">API Key</div>
        <input class="input" type="password" id="sk" value="${apiConfig.key}" placeholder="sk-..."></div>
      <div class="setting-group"><div class="setting-label">API URL</div>
        <input class="input" id="su" value="${apiConfig.url}" placeholder="https://..."></div>
      <div class="setting-group"><div class="setting-label">模型名称</div>
        <input class="input" id="sm" value="${apiConfig.model}" placeholder="model name"></div>
      <div class="setting-group"><div class="setting-label">System Prompt</div>
        <textarea class="input" id="ss" rows="3">${apiConfig.sysPrompt}</textarea></div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;margin-bottom:18px">💾 保存设置</button>
    <div class="setting-group"><div class="setting-label">🧠 记忆库管理</div>
      <div class="setting-row"><input class="input" id="smi" placeholder="添加记忆..." style="flex:1">
        <button class="btn btn-sm btn-primary" onclick="addMemS()">＋</button></div>
      ${memories.map((m,i)=>`<div class="mem-item"><span class="dot">•</span><span style="flex:1">${m}</span>
        <button class="del" onclick="removeMem(${i});renderSettings()">✕</button></div>`).join('')}
      ${memories.length===0?'<div style="font-size:13px;color:var(--muted)">还没有记忆</div>':''}</div>
    <div class="setting-group" style="border-top:1px solid var(--border);padding-top:16px">
      <div class="setting-label">数据管理</div>
      <button class="btn btn-sm btn-danger" onclick="if(confirm('确定清除所有数据？'))clearAll()" style="margin-top:4px">🗑 清除所有数据</button></div>
    <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:16px;padding-bottom:16px;font-weight:600">
      小钰の空間 · made with ♡ by 小克</div>`;
}
function onProvChange(){
  const p=document.getElementById('sp').value,pr=PROVS[p];
  apiConfig.provider=p;if(pr.u)apiConfig.url=pr.u;if(pr.m)apiConfig.model=pr.m;saveApi();renderSettings();
}
function saveSettings(){
  apiConfig.provider=document.getElementById('sp').value;
  const af=document.getElementById('af');
  if(af.style.display!=='none'){apiConfig.key=document.getElementById('sk').value;apiConfig.url=document.getElementById('su').value;
    apiConfig.model=document.getElementById('sm').value;apiConfig.sysPrompt=document.getElementById('ss').value;}
  saveApi();toggleSettings();if(currentPage==='chat')renderChat(document.getElementById('content'));
}
function addMemS(){const e=document.getElementById('smi');if(!e?.value.trim())return;memories.push(e.value.trim());saveMemories();renderSettings()}
function clearAll(){diary=[];todos=[];words=[];memories=[];chatSessions=[{id:1,name:'新对话 1',msgs:[],ts:Date.now()}];curSessId=1;apiUsage={total:{in:0,out:0,reqs:0},daily:{}};celebratedMilestones=[];saveDiary();saveTodos();saveWords();saveMemories();saveChat();saveUsage();saveCelebrated();toggleSettings();render()}

// ━━━━━━━━━━ PWA ━━━━━━━━━━
function initPWA(){
  const c=document.createElement('canvas');c.width=192;c.height=192;const x=c.getContext('2d');
  x.fillStyle='#FFF5F5';x.beginPath();x.roundRect(0,0,192,192,40);x.fill();
  x.fillStyle='#E8A0B4';x.beginPath();x.arc(96,78,38,0,Math.PI*2);x.fill();
  x.fillStyle='#FFF';x.font='34px serif';x.textAlign='center';x.fillText('♡',96,92);
  x.fillStyle='#E8A0B4';x.font='bold 24px Quicksand,sans-serif';x.fillText('小钰',96,152);
  const icon=c.toDataURL('image/png');
  const m={name:'小钰の空間',short_name:'小钰の空間',start_url:'.',display:'standalone',
    background_color:'#FFF5F5',theme_color:'#FFF5F5',icons:[{src:icon,sizes:'192x192',type:'image/png'}]};
  const b=new Blob([JSON.stringify(m)],{type:'application/json'});
  document.getElementById('manifest-link').href=URL.createObjectURL(b);
  const l=document.createElement('link');l.rel='apple-touch-icon';l.href=icon;document.head.appendChild(l);
}

// ━━━━━━━━━━ KEYBOARD HANDLING (iOS) ━━━━━━━━━━
function initKeyboard(){
  if(!window.visualViewport)return;
  const vv=window.visualViewport;
  let baseHeight=window.innerHeight;
  const handle=()=>{
    // 用 visualViewport 高度判断键盘是否弹起
    const kbOpen=vv.height < baseHeight - 100;
    document.body.classList.toggle('kb-open',kbOpen);
    if(kbOpen){
      document.body.style.height=vv.height+'px';
    } else {
      document.body.style.height='';
      baseHeight=window.innerHeight;
    }
    // 强制重置 viewport scroll，防止 iOS 把整页推走
    window.scrollTo(0,0);
  };
  vv.addEventListener('resize',handle);
  vv.addEventListener('scroll',handle);
  // 横屏切换时重置基准高度
  window.addEventListener('orientationchange',()=>{
    setTimeout(()=>{baseHeight=window.innerHeight;handle()},300);
  });
  // 监听所有 input/textarea focus，强制重置 scroll
  document.addEventListener('focusin',e=>{
    if(e.target.matches('input,textarea')){
      setTimeout(()=>window.scrollTo(0,0),50);
      setTimeout(()=>window.scrollTo(0,0),300);
    }
  });
  document.addEventListener('focusout',()=>{
    setTimeout(()=>window.scrollTo(0,0),50);
  });
}

// ━━━━━━━━━━ INIT ━━━━━━━━━━
applyDark();initPWA();initNav();render();initKeyboard();
</script>
