<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小钰の空間">
<meta name="theme-color" content="#C49A7A">
<title>小钰の空間</title>
<link rel="manifest" id="manifest-link">
<style>
:root {
  --bg:#FAF2EB;--card:#FFFFFF;--accent:#C49A7A;--accent-light:#E8D5C4;
  --accent-hover:#B38A6A;--text:#3D2E1F;--muted:#8B7D6B;--border:#E8DDD3;
  --success:#7CAE7A;--danger:#D4726A;--sidebar:#F3E8DD;--soft:#F5EBE3;
  --nav-h:68px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","Hiragino Sans",sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;height:100dvh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));flex-shrink:0}
.header h1{font-size:18px;font-weight:800;color:var(--accent)}
.header-btn{background:none;border:none;font-size:22px;color:var(--muted);padding:4px}

/* Main */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 16px;-webkit-overflow-scrolling:touch}

/* Bottom Nav */
.nav{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;
  padding-bottom:var(--safe-b)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;
  background:none;border:none;font-size:10px;color:var(--muted);transition:all .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn .icon{font-size:22px;line-height:1}
.nav-btn .label{font-weight:600}

/* Cards */
.card{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;
  border-radius:10px;border:none;font-size:14px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent-hover)}
.btn-secondary{background:var(--accent-light);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Inputs */
.input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
textarea.input{resize:none;min-height:60px}

/* Section titles */
.sec-title{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px}

/* Mood chips */
.mood-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.mood-chip{font-size:26px;padding:6px 8px;border-radius:12px;border:2px solid transparent;
  background:none;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:1px}
.mood-chip span{font-size:10px;color:var(--muted)}
.mood-chip.active{border-color:var(--accent);background:var(--soft)}

/* Todo item */
.todo-item{display:flex;align-items:center;gap:10px;padding:12px 14px}
.todo-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--accent);background:none;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.todo-check.done{background:var(--success);border-color:var(--success)}
.todo-text{flex:1;font-size:14px}
.todo-text.done{text-decoration:line-through;color:var(--muted)}
.todo-del{background:none;border:none;color:var(--muted);font-size:16px;padding:4px}

/* Vocab */
.vocab-item{display:flex;align-items:center;gap:10px;padding:10px 14px}
.vocab-star{background:none;border:none;font-size:16px;padding:2px}
.vocab-ja{font-size:15px;font-weight:600}
.vocab-zh{font-size:14px;color:var(--muted);margin-left:8px}
.flashcard{width:100%;max-width:320px;height:180px;margin:0 auto;border-radius:20px;
  border:2px solid var(--accent);background:var(--card);display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(196,154,122,.12)}
.flashcard-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.flashcard-word{font-size:26px;font-weight:700}

/* Chat */
.chat-area{flex:1;overflow-y:auto;padding:8px;background:var(--bg);border-radius:14px;
  border:1px solid var(--border);margin-bottom:10px;-webkit-overflow-scrolling:touch}
.chat-msg{display:flex;margin-bottom:10px}
.chat-msg.user{justify-content:flex-end}
.chat-msg.assistant{justify-content:flex-start}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.chat-msg.user .chat-bubble{background:var(--accent);color:#fff}
.chat-msg.assistant .chat-bubble{background:var(--card);border:1px solid var(--border)}
.chat-input-row{display:flex;gap:8px;flex-shrink:0}
.chat-empty{text-align:center;padding:40px 20px;color:var(--muted)}
.chat-empty .icon{font-size:36px;opacity:.3;margin-bottom:8px}

/* Settings panel */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
.settings-panel{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:20px 20px 0 0;
  z-index:101;transform:translateY(100%);transition:transform .35s ease;max-height:85dvh;display:flex;flex-direction:column;
  padding-bottom:var(--safe-b)}
.settings-panel.show{transform:translateY(0)}
.settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.settings-header h2{font-size:17px;font-weight:700}
.settings-body{overflow-y:auto;padding:16px 20px;flex:1;-webkit-overflow-scrolling:touch}
.setting-group{margin-bottom:18px}
.setting-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.setting-row{display:flex;gap:8px;margin-bottom:8px}

/* Countdown */
.countdown-card{padding:14px 16px;border-radius:14px}
.countdown-card .days{font-size:30px;font-weight:800;line-height:1.2}
.countdown-card .sub{font-size:11px;color:var(--muted);margin-top:2px}
.countdown-card .tag{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;font-weight:600;color:var(--muted)}

/* Memory tag */
.mem-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px}
.mem-item .dot{color:var(--accent)}
.mem-item .del{background:none;border:none;color:var(--muted);font-size:14px;padding:2px;cursor:pointer}

/* Utility */
.flex-center{display:flex;align-items:center;justify-content:center}
.gap-8{gap:8px}
.mb-12{margin-bottom:12px}
.text-center{text-align:center}
.page-title{font-size:20px;font-weight:700;margin-bottom:16px}
.tab-row{display:flex;gap:6px;margin-bottom:14px}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:14px}
.row{display:flex;gap:8px}

/* Chat page specific layout */
.chat-page{display:flex;flex-direction:column;height:100%}

/* Progress bar */
.progress-bar{height:4px;border-radius:2px;background:var(--accent-light);overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}

/* Quick stat */
.stat-val{font-size:26px;font-weight:700;color:var(--accent);line-height:1.2}
.stat-label{font-size:12px;color:var(--muted)}

/* Diary entry in history */
.diary-entry{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
.diary-entry:last-child{border-bottom:none}
.diary-mood{font-size:24px;flex-shrink:0}
.diary-date{font-size:12px;color:var(--muted)}
.diary-text{font-size:14px;line-height:1.5;margin-top:2px}
.diary-del{background:none;border:none;color:var(--danger);font-size:11px;cursor:pointer;padding:0;margin-top:4px}
</style>
</head>
<body>

<div class="header">
  <h1>小钰の空間</h1>
  <button class="header-btn" onclick="toggleSettings()">⚙️</button>
</div>

<div class="main" id="content"></div>

<nav class="nav" id="nav"></nav>

<!-- Settings Panel -->
<div class="overlay" id="overlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h2>⚙️ 设置</h2>
    <button class="header-btn" onclick="toggleSettings()">✕</button>
  </div>
  <div class="settings-body" id="settingsBody"></div>
</div>

<script>
// ━━━━━━━━━━ DATA LAYER ━━━━━━━━━━
const store = {
  get(k, fallback) { try { const v = localStorage.getItem('zoe-'+k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set(k, v) { try { localStorage.setItem('zoe-'+k, JSON.stringify(v)); } catch {} },
};

let diary = store.get('diary', []);
let todos = store.get('todos', []);
let words = store.get('vocab', []);
let memories = store.get('memories', []);
let chatMsgs = store.get('chat', []);
let apiConfig = store.get('api', {
  provider: 'none',
  url: '',
  key: '',
  model: '',
  sysPrompt: '你是小钰的私人AI助手。你温柔、有趣、记忆力很好。用中文回复，语气亲切自然，可以用颜文字但不要用😏或😂。回复简洁有用。',
});

function saveDiary() { store.set('diary', diary); }
function saveTodos() { store.set('todos', todos); }
function saveWords() { store.set('vocab', words); }
function saveMemories() { store.set('memories', memories); }
function saveChat() { store.set('chat', chatMsgs.slice(-50)); }
function saveApi() { store.set('api', apiConfig); }

// ━━━━━━━━━━ NAVIGATION ━━━━━━━━━━
const PAGES = [
  { id:'home', icon:'🏠', label:'首页' },
  { id:'diary', icon:'📖', label:'日记' },
  { id:'todo', icon:'☑️', label:'待办' },
  { id:'vocab', icon:'あ', label:'单词' },
  { id:'chat', icon:'💬', label:'聊天' },
];

let currentPage = 'home';

function initNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = PAGES.map(p =>
    `<button class="nav-btn${p.id===currentPage?' active':''}" data-page="${p.id}" onclick="navigate('${p.id}')">
      <div class="icon">${p.icon}</div><div class="label">${p.label}</div>
    </button>`
  ).join('');
}

function navigate(id) {
  currentPage = id;
  initNav();
  render();
}

function render() {
  const el = document.getElementById('content');
  const fn = { home: renderHome, diary: renderDiary, todo: renderTodo, vocab: renderVocab, chat: renderChat };
  if (fn[currentPage]) fn[currentPage](el);
}

// ━━━━━━━━━━ HELPERS ━━━━━━━━━━
const MOODS = [
  { emoji:'😊', label:'开心', color:'#FFB347' },
  { emoji:'😌', label:'平静', color:'#87CEEB' },
  { emoji:'😢', label:'难过', color:'#7B9EBF' },
  { emoji:'😤', label:'生气', color:'#E07A5F' },
  { emoji:'😴', label:'困困', color:'#B8A9C9' },
  { emoji:'🥰', label:'幸福', color:'#F4ACB7' },
  { emoji:'😰', label:'焦虑', color:'#CDB4DB' },
  { emoji:'🤩', label:'兴奋', color:'#FFD700' },
];

const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const daysBetween = (a, b) => Math.floor((b - a) / 86400000);
const ANNIVERSARY = new Date(2026, 2, 13);
const JAPAN = new Date(2028, 3, 1);
const WEEKDAYS = ['日','月','火','水','木','金','土'];

// ━━━━━━━━━━ HOME ━━━━━━━━━━
function renderHome(el) {
  const now = new Date();
  const h = now.getHours();
  const greet = h < 6 ? '夜深了，还没睡呀 🌙' : h < 12 ? '早上好 ☀️' : h < 18 ? '下午好 🌤️' : h < 23 ? '晚上好 ✨' : '夜猫子模式 🌙';
  const together = daysBetween(ANNIVERSARY, now);
  const toJapan = daysBetween(now, JAPAN);
  const todayMood = diary.find(d => d.date === fmtDate(now));
  const doneTodo = todos.filter(t => t.done).length;
  const pct = todos.length ? Math.round(doneTodo / todos.length * 100) : 0;

  el.innerHTML = `
    <div style="margin-bottom:4px;font-size:22px;font-weight:700">${greet}</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:20px">${fmtDate(now)} · ${WEEKDAYS[now.getDay()]}曜日</div>

    <div class="card-grid">
      <div class="card countdown-card" style="background:linear-gradient(135deg,#F5EBE3,#FAF2EB)">
        <div class="tag">❤️ 在一起</div>
        <div class="days" style="color:var(--accent)">${together}</div>
        <div class="sub">天 · 2026.03.13 起</div>
      </div>
      <div class="card countdown-card" style="background:linear-gradient(135deg,#E3EFF5,#F0F7FB)">
        <div class="tag">✈️ 去日本</div>
        <div class="days" style="color:#5B9BD5">${toJapan}</div>
        <div class="sub">天 · 目标 2028 春</div>
      </div>
    </div>

    <div class="card-grid">
      <div class="card" onclick="navigate('diary')" style="cursor:pointer">
        <div class="sec-title">今日心情</div>
        ${todayMood
          ? `<div style="font-size:26px">${todayMood.mood} <span style="font-size:13px">${MOODS.find(m=>m.emoji===todayMood.mood)?.label||''}</span></div>`
          : `<div style="font-size:13px;color:var(--muted)">还没记录 →</div>`}
      </div>
      <div class="card" onclick="navigate('todo')" style="cursor:pointer">
        <div class="sec-title">待办进度</div>
        <div class="stat-val">${doneTodo}/${todos.length}</div>
        <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <div class="card" onclick="navigate('diary')" style="cursor:pointer">
      <div class="sec-title">最近日记</div>
      ${diary.slice(0,3).map((d,i) => `
        <div class="diary-entry" ${i===Math.min(2,diary.length-1)?'style="border-bottom:none"':''}>
          <div class="diary-mood">${d.mood}</div>
          <div><div class="diary-date">${d.date}</div><div class="diary-text">${(d.text||'').slice(0,30)}${(d.text||'').length>30?'...':''}</div></div>
        </div>
      `).join('')}
      ${diary.length===0 ? '<div style="font-size:13px;color:var(--muted)">还没有日记，快去写一篇吧～</div>' : ''}
    </div>

    <div class="card" style="cursor:pointer" onclick="navigate('vocab')">
      <div class="sec-title">单词进度</div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span class="stat-val">${words.length}</span><span class="stat-label">个单词</span>
        <span style="margin-left:12px;font-size:14px;color:var(--muted)">⭐ ${words.filter(w=>w.star).length} 收藏</span>
      </div>
    </div>
  `;
}

// ━━━━━━━━━━ DIARY ━━━━━━━━━━
let diaryView = 'write';
let diaryMood = null;

function renderDiary(el) {
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center" class="mb-12">
      <div class="page-title" style="margin:0">心情日记</div>
      <div class="tab-row" style="margin:0">
        <button class="btn btn-sm ${diaryView==='write'?'btn-primary':'btn-secondary'}" onclick="diaryView='write';renderDiary(document.getElementById('content'))">写日记</button>
        <button class="btn btn-sm ${diaryView==='history'?'btn-primary':'btn-secondary'}" onclick="diaryView='history';renderDiary(document.getElementById('content'))">历史</button>
      </div>
    </div>
    <div id="diary-content"></div>
  `;
  const box = document.getElementById('diary-content');
  if (diaryView === 'write') {
    box.innerHTML = `
      <div class="card">
        <div class="sec-title">今天的心情是？</div>
        <div class="mood-grid">
          ${MOODS.map(m => `<button class="mood-chip ${diaryMood===m.emoji?'active':''}" onclick="diaryMood='${m.emoji}';renderDiary(document.getElementById('content'))">
            ${m.emoji}<span>${m.label}</span></button>`).join('')}
        </div>
        <textarea class="input" id="diary-text" placeholder="写点什么吧... 今天发生了什么？" style="margin-bottom:12px"></textarea>
        <button class="btn btn-primary" onclick="submitDiary()" ${diaryMood?'':'disabled'}>💾 保存今日日记</button>
      </div>
    `;
  } else {
    box.innerHTML = diary.length === 0
      ? '<div class="empty">📖 还没有日记，快去写第一篇吧～</div>'
      : diary.map((d,i) => `<div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:22px">${d.mood}</span>
              <span style="font-size:14px;font-weight:600">${MOODS.find(m=>m.emoji===d.mood)?.label||''}</span>
            </div>
            <span style="font-size:12px;color:var(--muted)">${d.date}</span>
          </div>
          ${d.text ? `<p style="font-size:14px;line-height:1.6;margin:4px 0 0">${d.text}</p>` : ''}
          <button class="diary-del" onclick="deleteDiary(${i})">删除</button>
        </div>`).join('');
  }
}

function submitDiary() {
  const text = document.getElementById('diary-text')?.value || '';
  const entry = { date: fmtDate(new Date()), mood: diaryMood, text, ts: Date.now() };
  const idx = diary.findIndex(d => d.date === entry.date);
  if (idx >= 0) diary[idx] = entry; else diary.unshift(entry);
  saveDiary(); diaryMood = null;
  renderDiary(document.getElementById('content'));
}

function deleteDiary(i) {
  diary.splice(i, 1); saveDiary();
  renderDiary(document.getElementById('content'));
}

// ━━━━━━━━━━ TODO ━━━━━━━━━━
function renderTodo(el) {
  const active = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);
  el.innerHTML = `
    <div class="page-title">待办事项</div>
    <div class="card" style="margin-bottom:14px">
      <div class="row">
        <input class="input" id="todo-input" placeholder="添加新待办..." style="flex:1"
          onkeydown="if(event.key==='Enter')addTodo()">
        <button class="btn btn-primary" onclick="addTodo()">＋</button>
      </div>
    </div>
    ${active.length ? `<div class="sec-title">进行中 (${active.length})</div>` : ''}
    ${active.map(t => todoItem(t, false)).join('')}
    ${done.length ? `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px">
        <div class="sec-title" style="margin:0">已完成 (${done.length})</div>
        <button style="background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer" onclick="clearDone()">清除</button>
      </div>` : ''}
    ${done.map(t => todoItem(t, true)).join('')}
    ${todos.length === 0 ? '<div class="empty">☑️ 没有待办事项，享受自由吧～</div>' : ''}
  `;
}

function todoItem(t, isDone) {
  return `<div class="card" style="padding:0;margin-bottom:8px;${isDone?'opacity:.6':''}">
    <div class="todo-item">
      <button class="todo-check ${isDone?'done':''}" onclick="toggleTodo(${t.id})">${isDone?'✓':''}</button>
      <span class="todo-text ${isDone?'done':''}">${t.text}</span>
      <button class="todo-del" onclick="removeTodo(${t.id})">🗑</button>
    </div>
  </div>`;
}

function addTodo() {
  const el = document.getElementById('todo-input');
  if (!el?.value.trim()) return;
  todos.unshift({ id: Date.now(), text: el.value.trim(), done: false });
  saveTodos(); renderTodo(document.getElementById('content'));
}
function toggleTodo(id) { const t = todos.find(x=>x.id===id); if(t) t.done=!t.done; saveTodos(); renderTodo(document.getElementById('content')); }
function removeTodo(id) { todos = todos.filter(x=>x.id!==id); saveTodos(); renderTodo(document.getElementById('content')); }
function clearDone() { todos = todos.filter(t=>!t.done); saveTodos(); renderTodo(document.getElementById('content')); }

// ━━━━━━━━━━ VOCAB ━━━━━━━━━━
let vocabView = 'list';
let quizIdx = 0;
let flipped = false;

function renderVocab(el) {
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center" class="mb-12">
      <div class="page-title" style="margin:0">日本語単語帳</div>
      <div class="tab-row" style="margin:0">
        <button class="btn btn-sm ${vocabView==='list'?'btn-primary':'btn-secondary'}" onclick="vocabView='list';renderVocab(document.getElementById('content'))">单词表</button>
        <button class="btn btn-sm ${vocabView==='quiz'?'btn-primary':'btn-secondary'}" onclick="vocabView='quiz';quizIdx=0;flipped=false;renderVocab(document.getElementById('content'))">练习</button>
      </div>
    </div>
    <div id="vocab-content"></div>
  `;
  const box = document.getElementById('vocab-content');
  if (vocabView === 'list') renderVocabList(box);
  else renderVocabQuiz(box);
}

function renderVocabList(box) {
  box.innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="row">
        <input class="input" id="vocab-ja" placeholder="日本語" style="flex:1" onkeydown="if(event.key==='Enter')addWord()">
        <input class="input" id="vocab-zh" placeholder="中文" style="flex:1" onkeydown="if(event.key==='Enter')addWord()">
        <button class="btn btn-primary" onclick="addWord()">＋</button>
      </div>
    </div>
    <div class="sec-title">共 ${words.length} 个单词</div>
    ${words.map((w,i) => `<div class="card" style="padding:0;margin-bottom:8px">
      <div class="vocab-item">
        <button class="vocab-star" onclick="toggleStar(${i})">${w.star?'⭐':'☆'}</button>
        <div style="flex:1"><span class="vocab-ja">${w.ja}</span><span class="vocab-zh">${w.zh}</span></div>
        <button class="todo-del" onclick="removeWord(${i})">🗑</button>
      </div>
    </div>`).join('')}
    ${words.length===0 ? '<div class="empty">📚 添加一些单词开始学习吧！</div>' : ''}
  `;
}

function renderVocabQuiz(box) {
  if (words.length === 0) { box.innerHTML = '<div class="empty">📚 先去添加一些单词吧～</div>'; return; }
  const w = words[quizIdx % words.length];
  const total = words.length;
  const cur = (quizIdx % total) + 1;
  box.innerHTML = `
    <div style="padding-top:20px;display:flex;flex-direction:column;align-items:center">
      <div class="flashcard" onclick="flipped=!flipped;renderVocab(document.getElementById('content'))">
        <div class="flashcard-label">${flipped?'中文':'日本語'} · 点击翻转</div>
        <div class="flashcard-word">${flipped ? w.zh : w.ja}</div>
      </div>
      <div style="display:flex;gap:12px;margin-top:20px;align-items:center">
        <button class="btn btn-secondary" onclick="quizIdx=(quizIdx-1+${total})%${total};flipped=false;renderVocab(document.getElementById('content'))">◀ 上一个</button>
        <span style="font-size:14px;color:var(--muted)">${cur} / ${total}</span>
        <button class="btn btn-primary" onclick="quizIdx=(quizIdx+1)%${total};flipped=false;renderVocab(document.getElementById('content'))">下一个 ▶</button>
      </div>
    </div>
  `;
}

function addWord() {
  const ja = document.getElementById('vocab-ja')?.value.trim();
  const zh = document.getElementById('vocab-zh')?.value.trim();
  if (!ja || !zh) return;
  words.unshift({ ja, zh, star: false });
  saveWords(); renderVocab(document.getElementById('content'));
}
function toggleStar(i) { words[i].star = !words[i].star; saveWords(); renderVocab(document.getElementById('content')); }
function removeWord(i) { words.splice(i, 1); saveWords(); renderVocab(document.getElementById('content')); }

// ━━━━━━━━━━ CHAT ━━━━━━━━━━
let chatLoading = false;
let showMemPanel = false;

function renderChat(el) {
  const configured = apiConfig.provider !== 'none' && apiConfig.key && apiConfig.url;
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  el.style.height = '100%';

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-shrink:0">
      <div class="page-title" style="margin:0">AI 聊天</div>
      <div class="row" style="gap:6px">
        <button class="btn btn-sm ${showMemPanel?'btn-primary':'btn-secondary'}" onclick="showMemPanel=!showMemPanel;renderChat(document.getElementById('content'))">🧠 ${memories.length}</button>
        <button class="btn btn-sm btn-danger" onclick="chatMsgs=[];saveChat();renderChat(document.getElementById('content'))">清空</button>
      </div>
    </div>

    ${showMemPanel ? `<div class="card" style="flex-shrink:0;max-height:180px;overflow-y:auto;margin-bottom:8px">
      <div class="sec-title">📝 记忆库 — 每次对话都会参考</div>
      <div class="row" style="margin-bottom:8px">
        <input class="input" id="mem-input" placeholder="添加记忆..." style="flex:1" onkeydown="if(event.key==='Enter')addMemory()">
        <button class="btn btn-sm btn-primary" onclick="addMemory()">＋</button>
      </div>
      ${memories.map((m,i) => `<div class="mem-item"><span class="dot">•</span><span style="flex:1">${m}</span><button class="del" onclick="removeMemory(${i})">✕</button></div>`).join('')}
    </div>` : ''}

    ${!configured ? `<div class="card" style="text-align:center;padding:30px">
      <div style="font-size:28px;margin-bottom:8px">🤖</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:12px">还没有配置 API<br>点右上角 ⚙️ 设置一下就能聊天啦</div>
      <button class="btn btn-primary" onclick="toggleSettings()">去设置</button>
    </div>` : `
      <div class="chat-area" id="chat-area">
        ${chatMsgs.length === 0 ? '<div class="chat-empty"><div class="icon">💬</div><div>说点什么吧～</div></div>' : ''}
        ${chatMsgs.map(m => `<div class="chat-msg ${m.role}"><div class="chat-bubble">${escHtml(m.content)}</div></div>`).join('')}
        ${chatLoading ? '<div class="chat-msg assistant"><div class="chat-bubble" style="color:var(--muted)">思考中...</div></div>' : ''}
        <div id="chat-end"></div>
      </div>
      <div class="chat-input-row">
        <input class="input" id="chat-input" placeholder="说点什么..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" style="flex:1">
        <button class="btn btn-primary" onclick="sendChat()" ${chatLoading?'disabled':''}>➤</button>
      </div>
    `}
  `;

  // Scroll to bottom
  const area = document.getElementById('chat-area');
  if (area) area.scrollTop = area.scrollHeight;

  // Reset main style when leaving chat
  if (currentPage !== 'chat') { el.style.display = ''; el.style.flexDirection = ''; el.style.height = ''; }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function addMemory() {
  const el = document.getElementById('mem-input');
  if (!el?.value.trim()) return;
  memories.push(el.value.trim()); saveMemories();
  renderChat(document.getElementById('content'));
}
function removeMemory(i) { memories.splice(i,1); saveMemories(); renderChat(document.getElementById('content')); }

async function sendChat() {
  const el = document.getElementById('chat-input');
  if (!el?.value.trim() || chatLoading) return;
  const text = el.value.trim();
  chatMsgs.push({ role: 'user', content: text });
  saveChat(); chatLoading = true;
  renderChat(document.getElementById('content'));

  try {
    const sysContent = apiConfig.sysPrompt +
      (memories.length ? '\n\n以下是你记住的关于小钰的信息：\n' + memories.map((m,i) => `${i+1}. ${m}`).join('\n') : '');

    let reply = '';

    if (apiConfig.provider === 'anthropic') {
      // Anthropic Messages API
      const res = await fetch(apiConfig.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiConfig.key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: apiConfig.model, max_tokens: 1024, system: sysContent,
          messages: chatMsgs.filter(m=>m.role!=='system').slice(-20).map(m=>({role:m.role,content:m.content}))
        }),
      });
      const data = await res.json();
      reply = data.content?.map(c => c.text || '').join('') || data.error?.message || '出错了...';
    } else {
      // OpenAI-compatible format (DeepSeek, etc.)
      const msgs = [{ role: 'system', content: sysContent },
        ...chatMsgs.filter(m=>m.role!=='system').slice(-20).map(m=>({role:m.role,content:m.content}))];
      const res = await fetch(apiConfig.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.key}` },
        body: JSON.stringify({ model: apiConfig.model, max_tokens: 1024, messages: msgs }),
      });
      const data = await res.json();
      reply = data.choices?.[0]?.message?.content || data.error?.message || '出错了...';
    }

    chatMsgs.push({ role: 'assistant', content: reply });
  } catch (e) {
    chatMsgs.push({ role: 'assistant', content: '网络出了点问题，检查一下API设置？(´；ω；`)' });
  }
  saveChat(); chatLoading = false;
  renderChat(document.getElementById('content'));
}

// ━━━━━━━━━━ SETTINGS ━━━━━━━━━━
const PROVIDERS = {
  none: { label: '未配置', url: '', model: '' },
  anthropic: { label: 'Anthropic (Claude)', url: 'https://api.anthropic.com/v1/messages', model: 'claude-sonnet-4-6' },
  deepseek: { label: 'DeepSeek', url: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' },
  openai: { label: 'OpenAI', url: 'https://api.openai.com/v1/chat/completions', model: 'gpt-4o-mini' },
  custom: { label: '自定义', url: '', model: '' },
};

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('overlay');
  const showing = panel.classList.contains('show');
  if (showing) { panel.classList.remove('show'); overlay.classList.remove('show'); }
  else { renderSettings(); panel.classList.add('show'); overlay.classList.add('show'); }
}

function renderSettings() {
  const body = document.getElementById('settingsBody');
  body.innerHTML = `
    <div class="setting-group">
      <div class="setting-label">AI 服务商</div>
      <select class="input" id="set-provider" onchange="onProviderChange()">
        ${Object.entries(PROVIDERS).map(([k,v]) => `<option value="${k}" ${apiConfig.provider===k?'selected':''}>${v.label}</option>`).join('')}
      </select>
    </div>

    <div class="setting-group" id="api-fields" style="${apiConfig.provider==='none'?'display:none':''}">
      <div class="setting-label">API Key</div>
      <input class="input" type="password" id="set-key" value="${apiConfig.key}" placeholder="sk-..." style="margin-bottom:10px">

      <div class="setting-label">API URL</div>
      <input class="input" id="set-url" value="${apiConfig.url}" placeholder="https://..." style="margin-bottom:10px">

      <div class="setting-label">模型名称</div>
      <input class="input" id="set-model" value="${apiConfig.model}" placeholder="model name" style="margin-bottom:10px">

      <div class="setting-label">System Prompt</div>
      <textarea class="input" id="set-prompt" rows="4" style="margin-bottom:10px">${apiConfig.sysPrompt}</textarea>
    </div>

    <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;margin-bottom:16px">💾 保存设置</button>

    <div class="setting-group">
      <div class="setting-label">🧠 记忆库管理</div>
      <div class="setting-row">
        <input class="input" id="set-mem" placeholder="添加记忆..." style="flex:1">
        <button class="btn btn-sm btn-primary" onclick="addMemSetting()">＋</button>
      </div>
      ${memories.map((m,i) => `<div class="mem-item"><span class="dot">•</span><span style="flex:1">${m}</span>
        <button class="del" onclick="removeMemory(${i});renderSettings()">✕</button></div>`).join('')}
      ${memories.length === 0 ? '<div style="font-size:13px;color:var(--muted)">还没有记忆条目</div>' : ''}
    </div>

    <div class="setting-group" style="border-top:1px solid var(--border);padding-top:16px">
      <div class="setting-label">数据管理</div>
      <button class="btn btn-sm btn-danger" onclick="if(confirm('确定要清除所有数据吗？'))clearAllData()" style="margin-top:4px">🗑 清除所有数据</button>
    </div>

    <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:16px;padding-bottom:16px">
      小钰の空間 · made with ♡
    </div>
  `;
}

function onProviderChange() {
  const provider = document.getElementById('set-provider').value;
  const preset = PROVIDERS[provider];
  apiConfig.provider = provider;
  if (preset.url) apiConfig.url = preset.url;
  if (preset.model) apiConfig.model = preset.model;
  saveApi(); renderSettings();
}

function saveSettings() {
  apiConfig.provider = document.getElementById('set-provider').value;
  const fields = document.getElementById('api-fields');
  if (fields.style.display !== 'none') {
    apiConfig.key = document.getElementById('set-key').value;
    apiConfig.url = document.getElementById('set-url').value;
    apiConfig.model = document.getElementById('set-model').value;
    apiConfig.sysPrompt = document.getElementById('set-prompt').value;
  }
  saveApi(); toggleSettings();
  if (currentPage === 'chat') renderChat(document.getElementById('content'));
}

function addMemSetting() {
  const el = document.getElementById('set-mem');
  if (!el?.value.trim()) return;
  memories.push(el.value.trim()); saveMemories(); renderSettings();
}

function clearAllData() {
  diary=[]; todos=[]; words=[]; memories=[]; chatMsgs=[];
  saveDiary(); saveTodos(); saveWords(); saveMemories(); saveChat();
  toggleSettings(); render();
}

// ━━━━━━━━━━ PWA MANIFEST ━━━━━━━━━━
function initPWA() {
  // Generate simple icon via canvas
  const canvas = document.createElement('canvas');
  canvas.width = 192; canvas.height = 192;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#FAF2EB';
  ctx.beginPath(); ctx.roundRect(0, 0, 192, 192, 40); ctx.fill();
  // Accent circle
  ctx.fillStyle = '#C49A7A';
  ctx.beginPath(); ctx.arc(96, 80, 40, 0, Math.PI * 2); ctx.fill();
  // Heart
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '36px serif';
  ctx.textAlign = 'center';
  ctx.fillText('♡', 96, 92);
  // Text
  ctx.fillStyle = '#C49A7A';
  ctx.font = 'bold 26px sans-serif';
  ctx.fillText('小钰', 96, 155);

  const iconUrl = canvas.toDataURL('image/png');

  const manifest = {
    name: '小钰の空間',
    short_name: '小钰の空間',
    description: 'All-in-one Dashboard',
    start_url: '.',
    display: 'standalone',
    background_color: '#FAF2EB',
    theme_color: '#C49A7A',
    icons: [{ src: iconUrl, sizes: '192x192', type: 'image/png' }],
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('manifest-link').href = URL.createObjectURL(blob);

  // Apple touch icon
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = iconUrl;
  document.head.appendChild(link);
}

// ━━━━━━━━━━ INIT ━━━━━━━━━━
initPWA();
initNav();
render();
</script>
